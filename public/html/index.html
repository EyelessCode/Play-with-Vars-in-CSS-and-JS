<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="EyelessCode">
    <meta name="description" content="Una página donde puedes cambiar en tiempo real variables de CSS con lan
      dinamicidad de JS.">
      <link rel="stylesheet" href="../styles/style.css">
    <title>Play with Vars</title>
  </head>
  <body>
    <header>
      <span>Play with 
        <span>JS</span> and 
        <span>CSS</span> vars</span>
    </header>
    <main>
      <section class="controls">
        <div>
          <label for="spacingRange">Spacing: </label>
          <input min="10" max="200" type="range" name="spacing"
            id="spacingRange">
        </div>

        <div>
          <label for="blurRange">Blur: </label>
          <input min="0" max="25" type="range" name="blur"
            id="blurRange">
        </div>

        <div>
          <label for="inputColor">Base color: </label>
          <input type="color" name="color" id="inputColor">
        </div>
      </section>
      <section class="bg">
        <img src="../resources/images/a0520915340490 - Tetto.webp" alt="Imagen utilizada para cambiar propiedades">
      </section>
    </main>
  </body>
</html>
