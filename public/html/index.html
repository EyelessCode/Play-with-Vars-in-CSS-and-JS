<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="EyelessCode">
    <meta name="description" content="Una página donde puedes cambiar en tiempo real variables de CSS con lan
      dinamicidad de JS.">
    <title>Play with Vars</title>
  </head>
  <body>
    <header>
      <span>Play with JS and CSS vars</span>
    </header>
    <main>
      <section class="controls">
        <label for="spacingRange">Spacing: </label>
        <input type="range" name="spacing" id="spacingRange">
        
        <label for="blurRange">Blur: </label>
        <input type="range" name="blur" id="blurRange">

        <label for="inputColor">Base color: </label>
        <input type="color" name="color" id="inputColor">
      </section>
      <section class="bg">
        <img src="#" alt="Imagen utilizada para cambiar propiedades">
      </section>
    </main>
  </body>
</html>
